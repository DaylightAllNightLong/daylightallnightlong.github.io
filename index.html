<!DOCTYPE html>
<html>
<head>
<title>Album Reviews</title>

<style>

body{
  font-family: Arial;
  max-width: 1000px;
  margin:auto;
  background:#111;
  color:white;
}

.page{
  display:flex;
  gap:40px;
}

#albums{
  flex:3;
}

#ranking{
  flex:1;
  border-left:1px solid #444;
  padding-left:20px;
}

.album{
  border-bottom:1px solid #444;
  padding:20px 0;
  display:flex;
  gap:20px;
}

img{
  width:120px;
  height:120px;
  object-fit:cover;
}

</style>
</head>

<body>

<h1>Album Reviews</h1>

<div class="page">

<div id="albums"></div>

<div id="ranking">
<h2>Ranking</h2>
</div>

</div>

<script>

const sheetURL = "https://opensheet.elk.sh/2PACX-1vSQcqFaWF-hb5omsFhFoAQaWiRwFwx2JpZp9AnQOp-YZi3zU04osljRIiYivhRccyCvCpT4e3H5yqM3/Sheet1";

fetch(sheetURL)
.then(res => res.json())
.then(albums => {

albums.sort((a,b)=>a.Ranking-b.Ranking);

const albumContainer = document.getElementById("albums");
const rankingContainer = document.getElementById("ranking");

albums.forEach((item,i)=>{

const div=document.createElement("div");
div.className="album";

div.innerHTML=`
<img src="${item.Cover}">
<div>
<h2>${item.Album} (${item.Year})</h2>
<p>${item.Review}</p>
</div>
`;

albumContainer.appendChild(div);

rankingContainer.innerHTML+=`<p>${i+1}. ${item.Album}</p>`;

});

});

</script>

</body>
</html>
