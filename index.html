<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Album Reviews</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    margin: 0;
    padding: 0;
    display: flex;
    min-height: 100vh;
  }
  .container {
    display: flex;
    flex: 1;
  }
  .main {
    flex: 3;
    padding: 20px;
  }
  .sidebar {
    flex: 1;
    background: #222;
    padding: 20px;
    border-left: 1px solid #444;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    border-bottom: 1px solid #444;
    padding: 10px;
    text-align: left;
  }
  th {
    background: #333;
  }
  img {
    max-width: 100px;
    height: auto;
  }
  .sidebar h2 {
    margin-top: 0;
    font-size: 1.2em;
    border-bottom: 1px solid #444;
    padding-bottom: 5px;
  }
  .sidebar ul {
    list-style: none;
    padding-left: 0;
  }
  .sidebar li {
    padding: 5px 0;
  }
</style>
</head>
<body>

<div class="container">
  <div class="main">
    <h1>Album Reviews</h1>
    <table id="albumTable">
      <thead>
        <tr>
          <th>Album</th>
          <th>Artist</th>
          <th>Review</th>
          <th>Photo</th>
          <th>Year</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="sidebar">
    <h2>Top Ranked Albums</h2>
    <ul id="rankedList"></ul>
  </div>
</div>

<script>
const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQcqFaWF-hb5omsFhFoAQaWiRwFwx2JpZp9AnQOp-YZi3zU04osljRIiYivhRccyCvCpT4e3H5yqM3/pub?gid=0&single=true&output=csv';

async function fetchData() {
  const response = await fetch(csvUrl);
  const data = await response.text();
  return data;
}

function parseCSV(csvText) {
  const rows = csvText.trim().split('\n').map(r => r.split(','));
  const headers = rows.shift(); // remove header row
  return rows.map(row => ({
    album: row[0],
    artist: row[1],
    review: row[2],
    photo: row[3],
    year: row[4],
    rank: parseFloat(row[5])
  }));
}

function renderTable(albums) {
  const tbody = document.querySelector('#albumTable tbody');
  tbody.innerHTML = '';
  albums.forEach(a => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${a.album}</td>
      <td>${a.artist}</td>
      <td>${a.review}</td>
      <td>${a.photo ? `<img src="${a.photo}" alt="${a.album}">` : ''}</td>
      <td>${a.year}</td>
    `;
    tbody.appendChild(tr);
  });
}

function renderSidebar(albums) {
  const ul = document.getElementById('rankedList');
  ul.innerHTML = '';
  // Sort descending by rank
  const sorted = albums.slice().sort((a, b) => b.rank - a.rank);
  sorted.forEach(a => {
    const li = document.createElement('li');
    li.textContent = a.album;
    ul.appendChild(li);
  });
}

async function init() {
  const csvText = await fetchData();
  const albums = parseCSV(csvText);
  renderTable(albums);
  renderSidebar(albums);
}

init();
</script>

</body>
</html>
