<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Reviews</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: auto; background: #111; color: white; padding: 20px; }
        .page { display: flex; gap: 40px; margin-top: 20px; }
        #albums { flex: 3; }
        #ranking { flex: 1; border-left: 1px solid #444; padding-left: 20px; min-width: 250px; }
        .album { border-bottom: 1px solid #444; padding: 20px 0; display: flex; gap: 20px; }
        img { width: 120px; height: 120px; object-fit: cover; border-radius: 4px; background: #222; }
        .year-text { color: #888; font-weight: normal; }
        .rank-row { margin-bottom: 8px; font-size: 0.95em; border-bottom: 1px solid #222; padding-bottom: 4px; }
    </style>
</head>
<body>

    <h1>Album Reviews</h1>

    <div class="page">
        <div id="albums">Loading albums...</div>
        <div id="ranking">
            <h2 style="margin-top:0">Ranking</h2>
            <div id="ranking-list"></div>
        </div>
    </div>

<script>
    const sheetURL = "https://opensheet.elk.sh/2PACX-1vSQcqFaWF-hb5omsFhFoAQaWiRwFwx2JpZp9AnQOp-YZi3zU04osljRIiYivhRccyCvCpT4e3H5yqM3/Sheet1";

    fetch(sheetURL)
    .then(res => res.json())
    .then(data => {
        const albumContainer = document.getElementById("albums");
        const rankingList = document.getElementById("ranking-list");
        albumContainer.innerHTML = "";

        // This helper function finds the correct column even if casing is wrong
        const getVal = (obj, key) => {
            const foundKey = Object.keys(obj).find(k => k.toLowerCase() === key.toLowerCase());
            return foundKey ? obj[foundKey] : "";
        };

        // Sort by ranking
        data.sort((a, b) => {
            let rankA = parseInt(getVal(a, "Ranking")) || 999;
            let rankB = parseInt(getVal(b, "Ranking")) || 999;
            return rankA - rankB;
        });

        data.forEach((item, i) => {
            // Get values safely
            const title = getVal(item, "Album");
            const year = getVal(item, "Year");
            const cover = getVal(item, "Cover");
            const review = getVal(item, "Review");

            // 1. Build Main List
            const div = document.createElement("div");
            div.className = "album";
            div.innerHTML = `
                <img src="${cover}" alt="Cover">
                <div>
                    <h2 style="margin:0">${title} <span class="year-text">(${year})</span></h2>
                    <p>${review}</p>
                </div>
            `;
            albumContainer.appendChild(div);

            // 2. Build Sidebar Ranking
            const rankDiv = document.createElement("div");
            rankDiv.className = "rank-row";
            rankDiv.innerHTML = `<strong>${i + 1}.</strong> ${title}`;
            rankingList.appendChild(rankDiv);
        });
    })
    .catch(err => {
        console.error(err);
        document.getElementById("albums").innerText = "Error loading data.";
    });
</script>

</body>
</html>
