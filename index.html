<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Review Feed</title>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --text: #ffffff;
    --accent: #00ff88; 
    --muted: #888;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    margin: 0;
    line-height: 1.6;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 350px;
    max-width: 1200px;
    margin: 0 auto;
    gap: 40px;
    padding: 40px 20px;
  }

  /* MAIN FEED */
  .main h1 {
    font-size: 2.5rem;
    margin-bottom: 30px;
    letter-spacing: -1px;
  }

  #albumsContainer {
    display: flex;
    flex-direction: column;
    gap: 25px;
  }

  /* THE CARD LAYOUT */
  .album-card {
    display: flex;
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #333;
    /* Removed hover transform */
  }

  .album-card img {
    width: 200px;
    height: 200px;
    object-fit: cover;
  }

  .album-content {
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .album-header {
    margin-bottom: 10px;
  }

  .album-title {
    font-size: 1.5rem;
    font-weight: 800;
    margin: 0;
  }

  .album-artist {
    font-size: 1.1rem;
    color: var(--accent);
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .album-review {
    color: #ccc;
    font-size: 0.95rem;
    margin: 10px 0;
  }

  .album-footer {
    margin-top: auto;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .highlight { color: #fff; font-weight: bold; }

  /* SIDEBAR RANKING */
  .sidebar {
    background: var(--card);
    padding: 30px;
    border-radius: 12px;
    height: fit-content;
    position: sticky;
    top: 20px;
  }

  .sidebar h2 {
    font-size: 1.2rem;
    text-transform: uppercase;
    margin-top: 0;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 10px;
  }

  .ranked-list {
    list-style: none;
    padding: 0;
    counter-reset: rank-counter;
  }

  .ranked-item {
    counter-increment: rank-counter;
    padding: 15px 0;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
  }

  .ranked-item::before {
    content: counter(rank-counter);
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--accent);
    margin-right: 20px;
    width: 30px;
    text-align: center;
  }

  .ranked-info .r-title { font-weight: bold; display: block; }
  .ranked-info .r-artist { font-size: 0.8rem; color: var(--muted); }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
    .album-card { flex-direction: column; }
    .album-card img { width: 100%; height: auto; aspect-ratio: 1/1; }
    .sidebar { position: static; }
  }
</style>
</head>
<body>

<div class="container">
  <main class="main">
    <h1>Latest Reviews</h1>
    <div id="albumsContainer">Loading reviews...</div>
  </main>

  <aside class="sidebar">
    <h2>Leaderboard</h2>
    <div id="rankedList" class="ranked-list"></div>
  </aside>
</div>

<script>
const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQcqFaWF-hb5omsFhFoAQaWiRwFwx2JpZp9AnQOp-YZi3zU04osljRIiYivhRccyCvCpT4e3H5yqM3/pub?gid=0&single=true&output=csv';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rows = lines.map(line => {
    const row = [];
    let current = '';
    let insideQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"' && line[i+1] === '"') { 
        current += '"'; i++;
      } else if (char === '"') {
        insideQuotes = !insideQuotes;
      } else if (char === ',' && !insideQuotes) {
        row.push(current);
        current = '';
      } else {
        current += char;
      }
    }
    row.push(current);
    return row;
  });
  
  rows.shift(); 
  return rows.map(r => ({
    album: r[0],
    artist: r[1],
    review: r[2],
    photo: r[3],
    year: r[4],
    rank: parseFloat(r[5]),
    listened: r[6]
  }));
}

function renderUI(albums) {
  const container = document.getElementById('albumsContainer');
  const sidebar = document.getElementById('rankedList');
  
  // 1. Render Main Cards
  container.innerHTML = '';
  albums.forEach(a => {
    const card = document.createElement('div');
    card.className = 'album-card';
    card.innerHTML = `
      <img src="${a.photo || 'https://via.placeholder.com/200'}" alt="Cover">
      <div class="album-content">
        <div class="album-header">
          <p class="album-artist">${a.artist}</p>
          <h2 class="album-title">${a.album} (${a.year})</h2>
        </div>
        <p class="album-review">${a.review}</p>
        <div class="album-footer">
          <span>Logged: <span class="highlight">${a.listened || 'N/A'}</span></span>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  // 2. Render Sidebar with Numbers
  sidebar.innerHTML = '';
  const sorted = [...albums].sort((a,b) => b.rank - a.rank);
  sorted.forEach(a => {
    const item = document.createElement('div');
    item.className = 'ranked-item';
    item.innerHTML = `
      <div class="ranked-info">
        <span class="r-title">${a.album}</span>
        <span class="r-artist">${a.artist}</span>
      </div>
    `;
    sidebar.appendChild(item);
  });
}

async function init() {
  try {
    const resp = await fetch(csvUrl);
    const text = await resp.text();
    const data = parseCSV(text);
    renderUI(data);
  } catch (e) {
    document.getElementById('albumsContainer').innerText = "Error loading data.";
    console.error(e);
  }
}

init();
</script>

</body>
</html>
