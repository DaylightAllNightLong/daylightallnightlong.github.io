<!DOCTYPE html>
<html>
<head>
  <title>Album Reviews</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: auto;
      background: #111;
      color: white;
    }

    .album {
      border-bottom: 1px solid #444;
      padding: 20px 0;
      display: flex;
      gap: 20px;
    }

    img {
      width: 120px;
      height: 120px;
      object-fit: cover;
    }
  </style>
</head>

<body>

<h1>Album Reviews</h1>
<div id="albums"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSQcqFaWF-hb5omsFhFoAQaWiRwFwx2JpZp9AnQOp-YZi3zU04osljRIiYivhRccyCvCpT4e3H5yqM3/pub?gid=0&single=true&output=csv";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {

    const rows = data.split("\n").slice(1);
    const albums = [];

    rows.forEach(row => {
      const cols = row.split(",");

      albums.push({
        album: cols[0],
        review: cols[1],
        cover: cols[2],
        year: cols[3],
        ranking: parseFloat(cols[4])
      });
    });

    // sort by ranking
    albums.sort((a, b) => a.ranking - b.ranking);

    const container = document.getElementById("albums");

    albums.forEach(item => {

      const div = document.createElement("div");
      div.className = "album";

      div.innerHTML = `
        <img src="${item.cover}">
        <div>
          <h2>${item.album} (${item.year})</h2>
          <p>${item.review}</p>
        </div>
      `;

      container.appendChild(div);

    });

  });
</script>

</body>
</html>
