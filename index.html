<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Album Reviews</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    margin: 0;
    display: flex;
    min-height: 100vh;
  }

  .container {
    display: flex;
    flex: 1;
  }

  .main {
    flex: 3;
    padding: 20px;
  }

  .album-card {
    display: flex;
    background: #1a1a1a;
    margin-bottom: 20px;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 10px #000;
    /* Removed any transitions that might cause visual 'pops' */
  }

  .album-card img {
    width: 150px;
    height: 150px;
    object-fit: cover;
  }

  .album-info {
    padding: 15px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .album-title {
    font-size: 1.4em;
    font-weight: bold;
    margin: 0;
  }

  .album-artist {
    font-size: 1em;
    color: #aaa;
    margin: 5px 0 10px 0;
  }

  .album-review {
    font-size: 0.95em;
    line-height: 1.4em;
    margin-bottom: 8px;
  }

  .album-listened {
    font-size: 0.85em;
    color: #ccc;
    font-style: italic;
  }

  .sidebar {
    flex: 1;
    background: #222;
    padding: 20px;
    border-left: 1px solid #444;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar h2 {
    margin-top: 0;
    font-size: 1.2em;
    border-bottom: 1px solid #444;
    padding-bottom: 5px;
  }

  .sidebar ul {
    list-style: none;
    padding-left: 0;
  }

  .sidebar li {
    padding: 5px 0;
  }
</style>
</head>
<body>

<div class="container">
  <div class="main">
    <h1>Album Reviews</h1>
    <div id="albumsContainer"></div>
  </div>
  <div class="sidebar">
    <h2>Top Ranked Albums</h2>
    <ul id="rankedList"></ul>
  </div>
</div>

<script>
const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQcqFaWF-hb5omsFhFoAQaWiRwFwx2JpZp9AnQOp-YZi3zU04osljRIiYivhRccyCvCpT4e3H5yqM3/pub?gid=0&single=true&output=csv';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rows = lines.map(line => {
    const row = [];
    let current = '';
    let insideQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"' && line[i+1] === '"') {
        current += '"';
        i++;
      } else if (char === '"') {
        insideQuotes = !insideQuotes;
      } else if (char === ',' && !insideQuotes) {
        row.push(current);
        current = '';
      } else {
        current += char;
      }
    }
    row.push(current);
    return row;
  });
  rows.shift(); 
  return rows.map(r => ({
    album: r[0],
    artist: r[1],
    review: r[2],
    photo: r[3],
    year: r[4],
    rank: parseFloat(r[5]), 
    listened: r[6] || ''
  }));
}

async function fetchData() {
  const resp = await fetch(csvUrl);
  const text = await resp.text();
  return parseCSV(text);
}

function renderAlbums(albums) {
  const container = document.getElementById('albumsContainer');
  container.innerHTML = '';
  albums.forEach(a => {
    const card = document.createElement('div');
    card.className = 'album-card';
    
    // Explicitly ensuring NO 'title' attribute is added here to prevent hover popups
    card.innerHTML = `
      ${a.photo ? `<img src="${a.photo}" alt="${a.album}">` : ''}
      <div class="album-info">
        <div class="album-title">${a.album} (${a.year})</div>
        <div class="album-artist">${a.artist}</div>
        <div class="album-review">${a.review}</div>
        ${a.listened ? `<div class="album-listened">Listened on: ${a.listened}</div>` : ''}
      </div>
    `;
    container.appendChild(card);
  });
}

function renderSidebar(albums) {
  const ul = document.getElementById('rankedList');
  ul.innerHTML = '';
  // We keep rank logic here just for the sorting order of the sidebar
  const sorted = albums.slice().sort((a,b) => b.rank - a.rank);
  sorted.forEach((a, index) => {
    const li = document.createElement('li');
    li.textContent = `${index+1}. ${a.album}`;
    ul.appendChild(li);
  });
}

async function init() {
  const albums = await fetchData();
  renderAlbums(albums);
  renderSidebar(albums);
}

init();
</script>

</body>
</html>
