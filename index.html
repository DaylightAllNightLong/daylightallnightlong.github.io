<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Album Reviews</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: auto;
    background: #111;
    color: white;
    padding: 20px;
  }
  .page { display: flex; gap: 40px; }
  #albums { flex: 3; }
  #ranking {
    flex: 1;
    border-left: 1px solid #444;
    padding-left: 20px;
    height: fit-content;
    position: sticky;
    top: 20px;
  }
  .album {
    border-bottom: 1px solid #444;
    padding: 20px 0;
    display: flex;
    gap: 20px;
    align-items: center;
  }
  img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    background: #222;
    border-radius: 4px;
  }
  h2 { margin: 0 0 10px 0; }
  .year { color: #888; font-weight: normal; }
  .rank-item { margin-bottom: 10px; font-size: 0.9rem; }
  .rank-num { color: #00d1b2; font-weight: bold; margin-right: 8px; }
</style>
</head>
<body>

<h1>Album Reviews</h1>

<div class="page">
  <div id="albums">Loading reviews...</div>
  <div id="ranking">
    <h2>Ranking</h2>
    <div id="ranking-list"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
  // This is your "Publish to Web" ID converted to a direct CSV download link
  const sheetID = "2PACX-1vSQcqFaWF-hb5omsFhFoAQaWiRwFwx2JpZp9AnQOp-YZi3zU04osljRIiYivhRccyCvCpT4e3H5yqM3";
  const csvURL = `https://docs.google.com/spreadsheets/d/e/${sheetID}/pub?output=csv`;

  Papa.parse(csvURL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      const albums = results.data;
      const albumContainer = document.getElementById("albums");
      const rankingList = document.getElementById("ranking-list");

      // Clear loading text
      albumContainer.innerHTML = "";

      // 1. Main List (Original Order)
      albums.forEach(item => {
        const div = document.createElement("div");
        div.className = "album";
        div.innerHTML = `
          <img src="${item.Cover || item.Photo || ''}" alt="Cover">
          <div>
            <h2>${item.Album} <span class="year">(${item.Year || ''})</span></h2>
            <p>${item.Review || ''}</p>
          </div>
        `;
        albumContainer.appendChild(div);
      });

      // 2. Ranking Sidebar (Sorted by the 'Ranking' column)
      const sorted = [...albums].sort((a, b) => parseFloat(b.Ranking || 0) - parseFloat(a.Ranking || 0));
      
      sorted.forEach((item, i) => {
        if(item.Album) {
          const p = document.createElement("div");
          p.className = "rank-item";
          p.innerHTML = `<span class="rank-num">#${i + 1}</span> ${item.Album}`;
          rankingList.appendChild(p);
        }
      });
    },
    error: function(err) {
      document.getElementById("albums").innerHTML = "Error loading data. Make sure 'Publish to Web' is set to CSV.";
    }
  });
</script>

</body>
</html>
